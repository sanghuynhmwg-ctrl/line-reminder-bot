name: LINE Reminder

name: LINE Reminder

on:
schedule:
- cron: '0 1 * * *'
- cron: '0 2 * * *'
- cron: '0 3 * * *'
- cron: '0 8 * * *'

workflow_dispatch:

jobs:
send:
runs-on: ubuntu-latest

steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python bot.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
