name: LINE Reminder

on:
  schedule:
# 08:00 VN (UTC+7)
- cron: '0 1 * * *'

# 09:00 VN
- cron: '0 2 * * *'

# 10:00 VN
- cron: '0 3 * * *'

# 15:00 VN
- cron: '0 8 * * *'

  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python bot.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
